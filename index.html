const grid=document.getElementById('cardGrid');
const filterBar=document.getElementById('filterBar');
const searchInput=document.getElementById('searchInput');
const totalCount=document.getElementById('totalCount');
const nicheCount=document.getElementById('nicheCount');
const cityCount=document.getElementById('cityCount');
let activeFilter='all';
function render(){
  grid.innerHTML='';
  const q=searchInput.value.toLowerCase();
  const filtered=SITES.filter(s=>{
    const matchFilter=activeFilter==='all'||s.niche===activeFilter;
    const matchSearch=!q||s.name.toLowerCase().includes(q)||s.niche.toLowerCase().includes(q)||s.city.toLowerCase().includes(q);
    return matchFilter&&matchSearch;
  });
  filtered.forEach(s=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-name">${s.name}</div><div class="card-niche">${s.niche}</div><div class="card-city">📍 ${s.city}, FL</div><a href="${s.url}" class="card-link" target="_blank">🌐 View Site</a>`;
    grid.appendChild(card);
  });
}
function buildFilters(){
  const niches=[...new Set(SITES.map(s=>s.niche))].sort();
  filterBar.innerHTML=`<button class="filter-btn active" data-filter="all">All (${SITES.length})</button>`;
  niches.forEach(n=>{
    const c=SITES.filter(s=>s.niche===n).length;
    filterBar.innerHTML+=`<button class="filter-btn" data-filter="${n}">${n} (${c})</button>`;
  });
  filterBar.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      filterBar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter=btn.dataset.filter;
      render();
    });
  });
}
totalCount.textContent=SITES.length;
nicheCount.textContent=new Set(SITES.map(s=>s.niche)).size;
cityCount.textContent=new Set(SITES.map(s=>s.city)).size;
buildFilters();
render();
searchInput.addEventListener('input',render);
</script>
